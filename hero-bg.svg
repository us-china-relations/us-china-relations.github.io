      <line x1="-50" y1="-14" x2="-22" y2="-14" stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- Top-right: 亞 (Asia) abstraction -->
    <g opacity="0.55">
      <line x1="14" y1="-58" x2="58" y2="-58" stroke="#7c2d12" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="14" y1="-18" x2="58" y2="-18" stroke="#7c2d12" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="22" y1="-58" x2="22" y2="-18" stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="50" y1="-58" x2="50" y2="-18" stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="28" y1="-42" x2="44" y2="-42" stroke="#7c2d12" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="28" y1="-32" x2="44" y2="-32" stroke="#7c2d12" stroke-width="1.6" stroke-linecap="round"/>
    </g>

