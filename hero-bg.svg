    <circle cx="72" cy="-72" r="1.6" fill="#7c2d12" opacity="0.35"/>
    <circle cx="-72" cy="72" r="1.6" fill="#7c2d12" opacity="0.35"/>
    <circle cx="72" cy="72" r="1.6" fill="#7c2d12" opacity="0.35"/>
