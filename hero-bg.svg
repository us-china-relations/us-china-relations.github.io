<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <!-- Warm cream-paper wash (left) -->
    <radialGradient id="paperLeft" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c67b5c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c67b5c" stop-opacity="0"/>
    </radialGradient>
    <!-- Warm cream-paper wash (right) -->
    <radialGradient id="paperRight" cx="80%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c67b5c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c67b5c" stop-opacity="0"/>
    </radialGradient>
    <!-- Central seal glow -->
    <radialGradient id="sealGlow" cx="50%" cy="50%" r="18%">
      <stop offset="0%" stop-color="#7c2d12" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#7c2d12" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7c2d12" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background washes -->
