  <!-- ===== CENTER: Classical seal (朱文印) ===== -->
  <g transform="translate(600 250)">
    <!-- Outer square frame (seal border) -->
    <rect x="-78" y="-78" width="156" height="156" fill="none" stroke="#7c2d12" stroke-width="2.4" opacity="0.32" rx="4"/>
    <rect x="-72" y="-72" width="144" height="144" fill="none" stroke="#7c2d12" stroke-width="0.8" opacity="0.2" rx="3"/>

    <!-- Inner cross dividing the seal into 4 quadrants (九宮格 feel) -->
    <line x1="-72" y1="0" x2="72" y2="0" stroke="#7c2d12" stroke-width="0.8" opacity="0.18"/>
    <line x1="0" y1="-72" x2="0" y2="72" stroke="#7c2d12" stroke-width="0.8" opacity="0.18"/>

    <!-- Stylized character fragments in the four quadrants (seal-script-like abstractions) -->
    <!-- Top-left: 東 (East) abstraction -->
    <g opacity="0.55">
      <line x1="-58" y1="-48" x2="-14" y2="-48" stroke="#7c2d12" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="-58" y1="-30" x2="-14" y2="-30" stroke="#7c2d12" stroke-width="2.4" stroke-linecap="round"/>
