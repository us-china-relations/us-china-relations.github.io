<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <!-- Left power node (Pacific west) -->
    <radialGradient id="poleWest" cx="18%" cy="50%" r="28%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#1e3a5f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
    <!-- Right power node (Pacific east) -->
    <radialGradient id="poleEast" cx="82%" cy="50%" r="28%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#1e3a5f" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
    <!-- Central planetary halo -->
    <radialGradient id="planetaryGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.05"/>
      <stop offset="70%" stop-color="#1e3a5f" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background washes -->
  <rect width="1200" height="500" fill="url(#poleWest)"/>
  <rect width="1200" height="500" fill="url(#poleEast)"/>
  <rect width="1200" height="500" fill="url(#planetaryGlow)"/>

  <!-- ===== LEFT POLE: concentric ring (power center) ===== -->
  <g transform="translate(216 250)">
    <circle r="78" stroke="#1e3a5f" stroke-width="1" opacity="0.12" fill="none"/>
    <circle r="58" stroke="#1e3a5f" stroke-width="1" opacity="0.16" fill="none"/>
    <circle r="40" stroke="#1e3a5f" stroke-width="1.2" opacity="0.22" fill="none"/>
    <circle r="24" stroke="#1e3a5f" stroke-width="1.3" opacity="0.3" fill="none"/>
    <circle r="9" fill="#1e3a5f" opacity="0.55"/>
  </g>

  <!-- ===== RIGHT POLE: concentric ring (power center) ===== -->
  <g transform="translate(984 250)">
    <circle r="78" stroke="#1e3a5f" stroke-width="1" opacity="0.12" fill="none"/>
    <circle r="58" stroke="#1e3a5f" stroke-width="1" opacity="0.16" fill="none"/>
    <circle r="40" stroke="#1e3a5f" stroke-width="1.2" opacity="0.22" fill="none"/>
    <circle r="24" stroke="#1e3a5f" stroke-width="1.3" opacity="0.3" fill="none"/>
    <circle r="9" fill="#1e3a5f" opacity="0.55"/>
  </g>

  <!-- ===== CENTRAL MERIDIAN ARC (planetary frame) ===== -->
  <g>
    <ellipse cx="600" cy="250" rx="340" ry="165" stroke="#1e3a5f" stroke-width="1" opacity="0.09" fill="none"/>
    <ellipse cx="600" cy="250" rx="300" ry="120" stroke="#1e3a5f" stroke-width="1" opacity="0.08" fill="none"/>
    <path d="M300 250 Q600 150 900 250" stroke="#1e3a5f" stroke-width="1.1" opacity="0.14" fill="none"/>
    <path d="M300 250 Q600 350 900 250" stroke="#1e3a5f" stroke-width="1.1" opacity="0.14" fill="none"/>
  </g>

  <!-- ===== MIDDLE-POWER NETWORK: nodes scattered in central band ===== -->
  <g fill="#1e3a5f">
    <!-- Upper arc nodes -->
    <circle cx="410" cy="190" r="3.2" opacity="0.38"/>
    <circle cx="495" cy="162" r="2.6" opacity="0.32"/>
    <circle cx="600" cy="150" r="3.8" opacity="0.44"/>
    <circle cx="705" cy="162" r="2.6" opacity="0.32"/>
    <circle cx="790" cy="190" r="3.2" opacity="0.38"/>
    <!-- Mid-latitude nodes -->
    <circle cx="380" cy="250" r="2.4" opacity="0.28"/>
    <circle cx="470" cy="240" r="2.8" opacity="0.34"/>
    <circle cx="550" cy="248" r="2.2" opacity="0.26"/>
    <circle cx="650" cy="252" r="2.4" opacity="0.28"/>
    <circle cx="730" cy="240" r="2.8" opacity="0.34"/>
    <circle cx="820" cy="250" r="2.4" opacity="0.28"/>
    <!-- Lower arc nodes -->
    <circle cx="410" cy="310" r="3.0" opacity="0.36"/>
    <circle cx="495" cy="338" r="2.6" opacity="0.3"/>
    <circle cx="600" cy="350" r="3.6" opacity="0.42"/>
    <circle cx="705" cy="338" r="2.6" opacity="0.3"/>
    <circle cx="790" cy="310" r="3.0" opacity="0.36"/>
  </g>

  <!-- ===== NETWORK LINES: connecting middle powers & poles ===== -->
  <g stroke="#1e3a5f" fill="none" stroke-linecap="round">
    <!-- West pole to middle powers -->
    <path d="M240 240 L380 250" stroke-width="0.9" opacity="0.18"/>
    <path d="M240 220 L410 190" stroke-width="0.9" opacity="0.16"/>
    <path d="M240 280 L410 310" stroke-width="0.9" opacity="0.16"/>
    <!-- East pole to middle powers -->
    <path d="M960 240 L820 250" stroke-width="0.9" opacity="0.18"/>
    <path d="M960 220 L790 190" stroke-width="0.9" opacity="0.16"/>
    <path d="M960 280 L790 310" stroke-width="0.9" opacity="0.16"/>
    <!-- Middle-power lattice (horizontal spine) -->
    <path d="M380 250 L470 240 L550 248 L650 252 L730 240 L820 250" stroke-width="0.7" opacity="0.15"/>
    <!-- Upper arc connections -->
    <path d="M410 190 L495 162 L600 150 L705 162 L790 190" stroke-width="0.7" opacity="0.14"/>
    <!-- Lower arc connections -->
    <path d="M410 310 L495 338 L600 350 L705 338 L790 310" stroke-width="0.7" opacity="0.14"/>
    <!-- Cross links toward central node -->
    <path d="M600 150 L600 250" stroke-width="0.6" opacity="0.1" stroke-dasharray="2 3"/>
    <path d="M600 350 L600 250" stroke-width="0.6" opacity="0.1" stroke-dasharray="2 3"/>
  </g>

  <!-- ===== CENTRAL FOCAL NODE (co-constitution point) ===== -->
  <g transform="translate(600 250)">
    <circle r="14" stroke="#1e3a5f" stroke-width="1" opacity="0.22" fill="none"/>
    <circle r="5" fill="#1e3a5f" opacity="0.5"/>
  </g>

  <!-- ===== BACKGROUND STAR FIELD: peripheral nodes (planetary context) ===== -->
  <g fill="#1e3a5f">
    <circle cx="110" cy="90"  r="1.5" opacity="0.18"/>
    <circle cx="170" cy="140" r="1.2" opacity="0.14"/>
    <circle cx="80"  cy="200" r="1.8" opacity="0.2"/>
    <circle cx="140" cy="380" r="1.4" opacity="0.16"/>
    <circle cx="80"  cy="430" r="1.2" opacity="0.14"/>
    <circle cx="1090" cy="90"  r="1.5" opacity="0.18"/>
    <circle cx="1030" cy="140" r="1.2" opacity="0.14"/>
    <circle cx="1120" cy="200" r="1.8" opacity="0.2"/>
    <circle cx="1060" cy="380" r="1.4" opacity="0.16"/>
    <circle cx="1120" cy="430" r="1.2" opacity="0.14"/>
    <circle cx="340" cy="60"  r="1.3" opacity="0.15"/>
    <circle cx="860" cy="60"  r="1.3" opacity="0.15"/>
    <circle cx="340" cy="440" r="1.3" opacity="0.15"/>
    <circle cx="860" cy="440" r="1.3" opacity="0.15"/>
  </g>
</svg>
