      <line x1="22" y1="18" x2="22" y2="38" stroke="#7c2d12" stroke-width="1.6"/>
      <line x1="50" y1="18" x2="50" y2="38" stroke="#7c2d12" stroke-width="1.6"/>
      <line x1="22" y1="38" x2="50" y2="38" stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="36" y1="14" x2="36" y2="42" stroke="#7c2d12" stroke-width="1.4"/>
      <path d="M36 42 Q30 52, 20 58" stroke="#7c2d12" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M36 42 Q44 52, 56 58" stroke="#7c2d12" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </g>

